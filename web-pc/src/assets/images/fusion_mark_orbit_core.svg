<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <radialGradient id="glare" cx="25%" cy="25%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="scanLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="50%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#f97316" stop-opacity="0" />
    </radialGradient>

    <filter id="fGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur">
        <animate attributeName="stdDeviation" values="4;10;4" dur="2s" repeatCount="indefinite" />
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(250, 250)">

    <g>
      <animateTransform
        attributeName="transform"
        type="scale"
        values="0.5;1"
        dur="0.8s"
        fill="freeze"
        calcMode="spline"
        keySplines="0.34 1.56 0.64 1"
      />

      <g>
        <circle r="190" fill="url(#glow)">
          <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="3s" repeatCount="indefinite" additive="sum" />
        </circle>
      </g>

      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
        <circle cx="0" cy="-185" r="6" fill="#fb923c" />
        <circle cx="0" cy="185" r="6" fill="#fb923c" />
        <circle cx="-185" cy="0" r="6" fill="#fb923c" />
        <circle cx="185" cy="0" r="6" fill="#fb923c" />
      </g>

      <g>
        <g>
          <animateTransform attributeName="transform" type="rotate" values="0;2;-2;0" dur="4s" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="scale" values="1;1.02;1" dur="4s" repeatCount="indefinite" additive="sum" />

          <circle r="150" fill="rgba(255,255,255,0.95)" stroke="#334155" stroke-width="42" />

          <ellipse cx="-60" cy="-60" rx="40" ry="30" fill="url(#glare)" transform="rotate(-20)" />

          <g>
            <g>
              <animateTransform attributeName="transform" type="scale" values="0;1" dur="0.8s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.34 1.56 0.64 1" />
              <animateTransform attributeName="transform" type="rotate" from="-180" to="0" dur="0.8s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.34 1.56 0.64 1" additive="sum" />
              <text x="0" y="55" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="170" font-weight="bold" fill="#f97316" filter="url(#fGlow)">F</text>
            </g>
          </g>

          <g opacity="0">
            <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite" />
            <animateTransform attributeName="transform" type="scale" values="0.9;1;1;1.1" dur="2.5s" repeatCount="indefinite" additive="sum" />

            <circle r="130" fill="none" stroke="#f97316" stroke-width="3" stroke-opacity="0.8" />

            <line x1="-130" y1="-130" x2="130" y2="-130" stroke="url(#scanLineGrad)" stroke-width="4" opacity="0.8">
              <animate attributeName="y1" values="-130;130" dur="2.5s" repeatCount="indefinite" />
              <animate attributeName="y2" values="-130;130" dur="2.5s" repeatCount="indefinite" />
            </line>

            <path d="M -110,-110 L -90,-110 M -110,-110 L -110,-90" stroke="#f97316" stroke-width="4" fill="none" stroke-linecap="round" />
            <path d="M 110,-110 L 90,-110 M 110,-110 L 110,-90" stroke="#f97316" stroke-width="4" fill="none" stroke-linecap="round" />
            <path d="M -110,110 L -90,110 M -110,110 L -110,90" stroke="#f97316" stroke-width="4" fill="none" stroke-linecap="round" />
            <path d="M 110,110 L 90,110 M 110,110 L 110,90" stroke="#f97316" stroke-width="4" fill="none" stroke-linecap="round" />
          </g>

          <g>
            <circle cx="-80" cy="0" r="4" fill="#fb923c">
              <animate attributeName="cy" values="0;-100;-200" dur="2s" repeatCount="indefinite" begin="0s" />
              <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0s" />
              <animate attributeName="r" values="0;4;0" dur="2s" repeatCount="indefinite" begin="0s" />
            </circle>
            <circle cx="-55" cy="0" r="4" fill="#fb923c">
              <animate attributeName="cy" values="0;-100;-200" dur="2s" repeatCount="indefinite" begin="0.2s" />
              <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.2s" />
              <animate attributeName="r" values="0;4;0" dur="2s" repeatCount="indefinite" begin="0.2s" />
            </circle>
            <circle cx="-30" cy="0" r="4" fill="#fb923c">
              <animate attributeName="cy" values="0;-100;-200" dur="2s" repeatCount="indefinite" begin="0.4s" />
              <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.4s" />
              <animate attributeName="r" values="0;4;0" dur="2s" repeatCount="indefinite" begin="0.4s" />
            </circle>
            <circle cx="-5" cy="0" r="4" fill="#fb923c">
              <animate attributeName="cy" values="0;-100;-200" dur="2s" repeatCount="indefinite" begin="0.6s" />
              <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.6s" />
              <animate attributeName="r" values="0;4;0" dur="2s" repeatCount="indefinite" begin="0.6s" />
            </circle>
            <circle cx="20" cy="0" r="4" fill="#fb923c">
              <animate attributeName="cy" values="0;-100;-200" dur="2s" repeatCount="indefinite" begin="0.8s" />
              <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.8s" />
              <animate attributeName="r" values="0;4;0" dur="2s" repeatCount="indefinite" begin="0.8s" />
            </circle>
            <circle cx="45" cy="0" r="4" fill="#fb923c">
              <animate attributeName="cy" values="0;-100;-200" dur="2s" repeatCount="indefinite" begin="1.0s" />
              <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="1.0s" />
              <animate attributeName="r" values="0;4;0" dur="2s" repeatCount="indefinite" begin="1.0s" />
            </circle>
            <circle cx="70" cy="0" r="4" fill="#fb923c">
              <animate attributeName="cy" values="0;-100;-200" dur="2s" repeatCount="indefinite" begin="1.2s" />
              <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="1.2s" />
              <animate attributeName="r" values="0;4;0" dur="2s" repeatCount="indefinite" begin="1.2s" />
            </circle>
            <circle cx="95" cy="0" r="4" fill="#fb923c">
              <animate attributeName="cy" values="0;-100;-200" dur="2s" repeatCount="indefinite" begin="1.4s" />
              <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="1.4s" />
              <animate attributeName="r" values="0;4;0" dur="2s" repeatCount="indefinite" begin="1.4s" />
            </circle>
          </g>
        </g>

      </g>
    </g>
  </g>
</svg>
