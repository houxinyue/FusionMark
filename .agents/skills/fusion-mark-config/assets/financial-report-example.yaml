description: "Financial report profile with period, company, revenue, profit, expense, growth, currency, and auditor highlights"

mineru_api_key: ""
mineru_base_url: "https://mineru.net/api/v4/extract"
mineru_client_mode: "open_sdk"
mineru_sdk_base_url: "https://mineru.net/api/v4"
mineru_sdk_token_env: "MINERU_API_KEY"
mineru_sdk_token: ""
mineru_sdk_extra_formats: []
mineru_enable_storage_input: true
mineru_enable_local_input: true
mineru_output_dir: "mineru_output"
mineru_model: "vlm"
mineru_enable_ocr: true
mineru_enable_formula: true
mineru_enable_table: true
mineru_language: "ch"
mineru_poll_interval: 3
mineru_max_retries: 60

highlight_config:
  extraction_prompt: |
    Extract key information from a financial report.

    Categories:
    1. report_period: reporting period.
    2. company_name: company name.
    3. revenue_amount: revenue amount.
    4. net_profit_amount: net profit amount.
    5. expense_item: major expense item.
    6. growth_rate: positive growth percentage or growth wording.
    7. decline_rate: negative growth, decline percentage, or decline wording.
    8. currency_unit: currency unit.
    9. auditor_name: auditor or audit firm.

    Rules:
    - Use exact source text.
    - Include currency units with monetary values when present.
    - Preserve percent symbols, commas, and Chinese/English units.
    - Do not calculate missing values.
    - Distinguish growth from decline based on explicit wording or signs.

  examples:
    - text: |
        Tencent Holdings 2024 Q4 Financial Report
        Revenue was RMB 165.2 billion, up 8% year over year.
        Net profit was RMB 47.8 billion, down 2% from the same period last year.
        Major expense: R&D expense RMB 18.9 billion.
        Auditor: PricewaterhouseCoopers Zhong Tian LLP
      extractions:
        - class: company_name
          text: "Tencent Holdings"
        - class: report_period
          text: "2024 Q4"
        - class: revenue_amount
          text: "RMB 165.2 billion"
        - class: growth_rate
          text: "up 8%"
        - class: net_profit_amount
          text: "RMB 47.8 billion"
        - class: decline_rate
          text: "down 2%"
        - class: expense_item
          text: "R&D expense RMB 18.9 billion"
        - class: currency_unit
          text: "RMB"
        - class: auditor_name
          text: "PricewaterhouseCoopers Zhong Tian LLP"

  model_config:
    model_id: "deepseek-chat"
    provider: "OpenAILanguageModel"
    api_key_env: "DS_API_KEY"
    base_url_env: "DS_API_BASE_URL"
    provider_kwargs:
      temperature: 0.1
      max_tokens: 4000

  category_colors:
    - name: report_period
      color: "#f1c40f"
      description: "Report Period"
    - name: company_name
      color: "#6c5ce7"
      description: "Company"
    - name: revenue_amount
      color: "#2ecc71"
      description: "Revenue"
    - name: net_profit_amount
      color: "#3498db"
      description: "Net Profit"
    - name: expense_item
      color: "#e67e22"
      description: "Expense"
    - name: growth_rate
      color: "#27ae60"
      description: "Growth"
    - name: decline_rate
      color: "#e74c3c"
      description: "Decline"
    - name: currency_unit
      color: "#95a5a6"
      description: "Currency"
    - name: auditor_name
      color: "#00cec9"
      description: "Auditor"

  mineru_output_dir: "mineru_output"
  output_dir: "highlight_output"
  default_title: "Financial Report Analysis"
  page_header: "Financial Report Highlight Analysis"
  renderer: "dom_tracking"

final_output_dir: "highlight_output"
