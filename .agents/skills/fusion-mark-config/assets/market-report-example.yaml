description: "Smartphone market report profile with vendor, shipment, share, growth, and source highlights"

mineru_api_key: ""
mineru_base_url: "https://mineru.net/api/v4/extract"
mineru_client_mode: "open_sdk"
mineru_sdk_base_url: "https://mineru.net/api/v4"
mineru_sdk_token_env: "MINERU_API_KEY"
mineru_sdk_token: ""
mineru_sdk_extra_formats: []
mineru_enable_storage_input: true
mineru_enable_local_input: true
mineru_output_dir: "mineru_output"
mineru_model: "vlm"
mineru_enable_ocr: true
mineru_enable_formula: false
mineru_enable_table: true
mineru_language: "ch"
mineru_poll_interval: 3
mineru_max_retries: 60

highlight_config:
  extraction_prompt: |
    Extract key facts from a smartphone market report or table.

    Categories:
    1. report_title: report title.
    2. data_source: source organization or source line.
    3. vendor_international: international vendors such as Apple and Samsung.
    4. vendor_chinese: Chinese vendors such as Xiaomi, vivo, OPPO, Honor, Huawei, and Transsion.
    5. shipment_value: shipment volume values.
    6. market_share: market share percentages.
    7. growth_positive: positive year-over-year growth values.
    8. growth_negative: negative year-over-year growth values.

    Rules:
    - Use exact source text.
    - Extract vendor names only from vendor/company columns or clearly stated vendor mentions.
    - Do not extract "Other" or "Total" rows as vendors.
    - Preserve units, commas, decimal points, signs, and percent symbols.
    - Classify negative growth only when the text contains a minus sign or explicit decline wording.

  examples:
    - text: |
        Top 5 Companies, Worldwide Smartphone Shipments
        Vendor | 2024 Shipments | 2024 Share | YoY
        Apple | 240.6 | 19% | 7%
        Xiaomi | 165.4 | 13% | -2%
        Source: Omdia
      extractions:
        - class: report_title
          text: "Top 5 Companies, Worldwide Smartphone Shipments"
        - class: vendor_international
          text: "Apple"
        - class: vendor_chinese
          text: "Xiaomi"
        - class: shipment_value
          text: "240.6"
        - class: shipment_value
          text: "165.4"
        - class: market_share
          text: "19%"
        - class: market_share
          text: "13%"
        - class: growth_positive
          text: "7%"
        - class: growth_negative
          text: "-2%"
        - class: data_source
          text: "Omdia"

  model_config:
    model_id: "deepseek-chat"
    provider: "OpenAILanguageModel"
    api_key_env: "DS_API_KEY"
    base_url_env: "DS_API_BASE_URL"
    provider_kwargs:
      temperature: 0.1
      max_tokens: 4000

  category_colors:
    - name: report_title
      color: "#e67e22"
      description: "Report Title"
    - name: data_source
      color: "#95a5a6"
      description: "Data Source"
    - name: vendor_international
      color: "#9370DB"
      description: "International Vendor"
    - name: vendor_chinese
      color: "#0066CC"
      description: "Chinese Vendor"
    - name: shipment_value
      color: "#3498db"
      description: "Shipment Value"
    - name: market_share
      color: "#9b59b6"
      description: "Market Share"
    - name: growth_positive
      color: "#27ae60"
      description: "Positive Growth"
    - name: growth_negative
      color: "#e74c3c"
      description: "Negative Growth"

  mineru_output_dir: "mineru_output"
  output_dir: "highlight_output"
  default_title: "Smartphone Market Analysis"
  page_header: "Smartphone Shipment Report Analysis"
  renderer: "dom_tracking"

final_output_dir: "highlight_output"
