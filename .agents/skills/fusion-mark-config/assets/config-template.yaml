# Fusion-Mark profile template for FullPipelineConfig.
# Replace categories, prompt, examples, and titles for the target business scenario.

description: "Generic document highlighting profile"

# MinerU parsing settings.
mineru_api_key: ""
mineru_base_url: "https://mineru.net/api/v4/extract"
mineru_client_mode: "open_sdk"
mineru_sdk_base_url: "https://mineru.net/api/v4"
mineru_sdk_token_env: "MINERU_API_KEY"
mineru_sdk_token: ""
mineru_sdk_extra_formats: []
mineru_enable_storage_input: true
mineru_enable_local_input: true
mineru_output_dir: "mineru_output"
mineru_model: "vlm"
mineru_enable_ocr: true
mineru_enable_formula: true
mineru_enable_table: true
mineru_language: "ch"
mineru_poll_interval: 3
mineru_max_retries: 60

highlight_config:
  extraction_prompt: |
    Extract the following information from the document:

    1. category_name_1: Describe the first entity type.
    2. category_name_2: Describe the second entity type.
    3. category_name_3: Describe the third entity type.

    Rules:
    - Use exact text from the source document.
    - Extract each entity separately.
    - Preserve original punctuation, units, signs, and percentage symbols.
    - Do not infer values that are not explicitly present.

  examples:
    - text: |
        Example document text containing category one and category two.
      extractions:
        - class: category_name_1
          text: "category one"
        - class: category_name_2
          text: "category two"

  model_config:
    model_id: "deepseek-chat"
    provider: "OpenAILanguageModel"
    api_key_env: "DS_API_KEY"
    base_url_env: "DS_API_BASE_URL"
    provider_kwargs:
      temperature: 0.1
      max_tokens: 4000

  category_colors:
    - name: category_name_1
      color: "#e67e22"
      description: "Category 1"
    - name: category_name_2
      color: "#2ecc71"
      description: "Category 2"
    - name: category_name_3
      color: "#3498db"
      description: "Category 3"

  mineru_output_dir: "mineru_output"
  output_dir: "highlight_output"
  default_title: "Document Analysis Report"
  page_header: "Automatic Document Analysis"
  renderer: "dom_tracking"

final_output_dir: "highlight_output"
